services:
  db:
    image: postgres:18-bookworm
    container_name: mealbase-db
    environment:
      POSTGRES_USER: mealbase
      POSTGRES_PASSWORD: mealbase
      POSTGRES_DB: mealbase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  api:
    image: node:24-bookworm
    container_name: mealbase-api
    working_dir: /workspace/services/api
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/services/api/node_modules
    ports:
      - "3001:3001"
    depends_on:
      - db
    env_file:
      - .env
    command:
      [
        "bash",
        "-lc",
        "npm install && npx nodemon --legacy-watch --watch src --ext ts --exec 'npx tsx src/index.ts'",
      ]

volumes:
  postgres_data:
  api_node_modules:
